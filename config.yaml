    group: "G — oMLX (SSD KV Cache)"
    backend: omlx
    model_id: "Qwen3.5-35B-A3B-4bit"
    fmt: MLX
    quant: 4bit
    kv_cache: ssd-paged

  - id: G_CTX_1
