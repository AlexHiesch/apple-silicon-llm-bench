    backend: llama-server
    model_id: "~/.cache/llmfit/models/Qwen3-Coder-Next-Q4_K_M.gguf"
    fmt: GGUF
    quant: Q4_K_M
    kv_cache: kv-q8+reuse
    extra_args: ["-ctk", "q8_0", "-ctv", "q8_0", "--cache-reuse", "256",
                 "-c", "131072"]

  - id: H_CTX_1
    name: "Coder Q4 cache-reuse ctx"
