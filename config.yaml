  # ══════════════════════════════════════════════════════════════════════════════
  # Group Q — MTP Speculative Decoding (BLOCKED — mlx-lm 0.31.3 limitations)
  #
  # Three approaches investigated, all blocked:
  #
  # 1. Google's official MTP drafter (gemma4_assistant model_type):
  #    - Uses a centroid-based output head (num_centroids: 2048) that hooks
  #      into backbone hidden states (pre_projection 5632→1024, post 1024→2816)
  #    - NOT a standalone autoregressive model — designed to inject into backbone
  #      forward pass, not work as an independent draft model
  #    - mlx-lm 0.31.3 has no gemma4_assistant module (raises ValueError on load)
  #
  # 2. Naive speculative (E2B as draft for 26B):
  #    - E2B is Gemma4ForConditionalGeneration (VLM) with num_kv_shared_layers=20
  #    - mlx-lm gemma4.py loads 26B (num_kv_shared_layers=0) fine, but fails
  #      for E2B: 20 layers × 7 KV weight tensors = 140 "extra parameters"
  #      because gemma4_text.py doesn't match the quantized VLM weight layout
  #    - Additionally: 26B is MoE (30 layers), E2B is dense (35 layers) →
  #      architecturally incompatible for mlx-lm speculative decoding
  #
  # 3. E2B draft for E4B (both dense):
  #    - Same num_kv_shared_layers bug affects E4B (num_kv_shared_layers=18)
  #    - Both would need fixes in mlx-lm before this works
  #
  # Resolution: needs mlx-lm update (either gemma4_assistant support or fix
  # for num_kv_shared_layers weight loading in quantized Gemma4 VLMs).
  # Re-enable when mlx-lm 0.31.4+ ships with a fix.
  # ══════════════════════════════════════════════════════════════════════════════

  # ── llama.cpp speculative decoding (viable alternative to mlx-lm MTP) ───────
  # Gemma4-26B as main model, Gemma4-E2B as draft model.
  # Both share the same Gemma4 tokenizer (262144-token vocab) — required for
  # llama.cpp speculative decoding. Draft is offloaded fully (-ngld 99).
