  # prefix (≥256 tokens), it reuses existing KV entries instead of recomputing.
  # Directly models Claude Code's pattern: same system prompt prepended every turn.
  # Compare with B_Q4_5 (kv-q8 without cache reuse) to isolate the reuse benefit.
  # -c 131072 allocates full 128k context window upfront.

  - id: H_CR_1
    name: "Coder Q4 kv-q8 cache-reuse"
